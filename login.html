<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Exotic Utilities</title>
<meta name="theme-color" content="#6390ff">
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#030712;--surface:#0a0f1a;--card:#0c1222;--border:rgba(255,255,255,0.05);--border-h:rgba(99,144,255,0.3);--blue:#6390ff;--blue-dim:rgba(99,144,255,0.1);--blue-glow:rgba(99,144,255,0.3);--accent:#818cf8;--white:#f0f2f8;--gray:#6b7280;--gray-lt:#9ca3af;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;cursor:none;}
a,button{cursor:none;text-decoration:none;}
::selection{background:var(--blue-dim);color:var(--blue);}
#cursor-dot{position:fixed;top:0;left:0;width:10px;height:10px;border-radius:50%;background:var(--blue);z-index:9999;pointer-events:none;box-shadow:0 0 14px var(--blue-glow);mix-blend-mode:screen;transform:translate(-100px,-100px);}
#cursor-ring{position:fixed;top:0;left:0;width:44px;height:44px;z-index:9998;pointer-events:none;opacity:0.4;transition:opacity 0.2s,transform 0.18s ease;transform:translate(-100px,-100px);}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(99,144,255,0.06),transparent 70%);top:-200px;left:-200px;}
.orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(129,140,248,0.05),transparent 70%);bottom:-150px;right:-150px;}
.card{width:100%;max-width:440px;background:var(--card);border:1px solid var(--border);border-radius:28px;padding:48px 44px;position:relative;z-index:1;animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:28px 28px 0 0;background:linear-gradient(90deg,var(--blue),var(--accent));}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px;}
.logo-icon{width:44px;height:44px;border-radius:12px;overflow:hidden;box-shadow:0 0 24px var(--blue-glow);}
.logo-icon img{width:100%;height:100%;object-fit:cover;}
.logo-text{font-size:20px;font-weight:800;}
.logo-text span{color:var(--blue);}
.card-title{font-size:28px;font-weight:900;text-align:center;margin-bottom:8px;letter-spacing:-0.02em;}
.card-sub{font-size:15px;color:var(--gray-lt);text-align:center;margin-bottom:36px;line-height:1.5;}
.discord-btn{width:100%;padding:16px;border-radius:14px;background:#5865f2;color:#fff;font-weight:800;font-size:16px;border:none;font-family:'Outfit';display:flex;align-items:center;justify-content:center;gap:14px;transition:all 0.2s;box-shadow:0 0 32px rgba(88,101,242,0.35);position:relative;overflow:hidden;}
.discord-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.08),transparent);}
.discord-btn:hover{transform:translateY(-2px);box-shadow:0 0 48px rgba(88,101,242,0.5);}
.discord-btn svg{width:26px;height:26px;flex-shrink:0;position:relative;z-index:1;}
.discord-btn-inner{display:flex;flex-direction:column;align-items:flex-start;line-height:1.3;position:relative;z-index:1;}
.discord-btn-label{font-size:16px;font-weight:800;}
.discord-btn-sub{font-size:11px;font-weight:500;opacity:0.8;}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--gray);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.info-box{background:rgba(99,144,255,0.04);border:1px solid rgba(99,144,255,0.1);border-radius:12px;padding:14px 16px;font-size:13px;color:var(--gray-lt);line-height:1.6;text-align:center;}
.info-box strong{color:var(--blue);}
.back-link{display:block;text-align:center;margin-top:24px;font-size:13px;color:var(--gray);transition:color 0.2s;}
.back-link:hover{color:var(--blue);}
@media(max-width:500px){body,*,a,button{cursor:auto!important;}#cursor-dot,#cursor-ring{display:none!important;}.card{padding:36px 24px;}}
</style>
</head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-ring"><svg width="44" height="44" viewBox="0 0 44 44" fill="none"><circle cx="22" cy="22" r="18" stroke="#6390ff" stroke-width="1" opacity="0.6"/><line x1="22" y1="0" x2="22" y2="8" stroke="#6390ff" stroke-width="1" opacity="0.4"/><line x1="22" y1="36" x2="22" y2="44" stroke="#6390ff" stroke-width="1" opacity="0.4"/><line x1="36" y1="22" x2="44" y2="22" stroke="#6390ff" stroke-width="1" opacity="0.4"/></svg></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><img src="logo.png" alt="EU"></div>
    <div class="logo-text">Exotic <span>Utilities</span></div>
  </div>
  <div class="card-title">Welcome back</div>
  <div class="card-sub">Sign in to your Exotic Utilities account to track and place bot orders</div>
  <button class="discord-btn" onclick="loginWithDiscord()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.032.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    <div class="discord-btn-inner">
      <span class="discord-btn-label">Continue with Discord</span>
      <span class="discord-btn-sub">Instant sign in — no password needed</span>
    </div>
  </button>
  <div class="divider">what you get</div>
  <div class="info-box">Sign in with Discord to access your <strong>order dashboard</strong>, track bot delivery status, and place new orders instantly.</div>
  <a href="index.html" class="back-link">← Back to Home</a>
</div>
<script>
const CLIENT_ID   = "1480018197334982749";
const REDIRECT_URI = "https://martin54-hub2.github.io/Exotic-Utilities-/dashboard.html";

// Already logged in? Go to dashboard
try{
  const u=localStorage.getItem("eu_discord_user");
  if(u&&JSON.parse(u).id) window.location.href="dashboard.html";
}catch(e){}

function loginWithDiscord(){
  const params=new URLSearchParams({
    client_id:CLIENT_ID,
    redirect_uri:REDIRECT_URI,
    response_type:"token",
    scope:"identify",
  });
  window.location.href="https://discord.com/api/oauth2/authorize?"+params.toString();
}

(function(){
  const dot=document.getElementById("cursor-dot"),ring=document.getElementById("cursor-ring");
  let mx=-100,my=-100,dx=-100,dy=-100,rx=-100,ry=-100,hov=false;
  document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;});
  document.addEventListener("mouseover",e=>{if(e.target.closest("a,button"))hov=true;});
  document.addEventListener("mouseout",e=>{if(e.target.closest("a,button"))hov=false;});
  function tick(){dx+=(mx-dx)*0.45;dy+=(my-dy)*0.45;rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;dot.style.transform=`translate(${dx-5}px,${dy-5}px)`;const s=hov?1.8:1;ring.style.transform=`translate(${rx-22}px,${ry-22}px) scale(${s})`;ring.style.opacity=hov?"0.7":"0.4";requestAnimationFrame(tick);}tick();
})();
</script>
</body>
</html>
