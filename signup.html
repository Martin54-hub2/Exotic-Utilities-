<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Exotic Utilities</title>
<meta name="theme-color" content="#6390ff">
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#030712;--surface:#0a0f1a;--card:#0c1222;--border:rgba(255,255,255,0.05);--border-h:rgba(99,144,255,0.3);--blue:#6390ff;--blue-bright:#7ba4ff;--blue-dim:rgba(99,144,255,0.1);--blue-glow:rgba(99,144,255,0.3);--accent:#818cf8;--white:#f0f2f8;--gray:#6b7280;--gray-lt:#9ca3af;--gray-dk:#1f2937;--green:#22c55e;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden;cursor:none;padding:24px;}
a,button{cursor:none;}
::selection{background:var(--blue-dim);color:var(--blue);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--gray-dk);border-radius:3px;}

#cursor-dot{position:fixed;top:0;left:0;width:10px;height:10px;border-radius:50%;background:var(--blue);z-index:9999;pointer-events:none;box-shadow:0 0 14px var(--blue-glow);mix-blend-mode:screen;transform:translate(-100px,-100px);}
#cursor-ring{position:fixed;top:0;left:0;width:44px;height:44px;z-index:9998;pointer-events:none;opacity:0.4;transition:opacity 0.2s,transform 0.18s ease;transform:translate(-100px,-100px);}

.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);}
.orb1{width:500px;height:500px;top:-100px;right:-80px;background:radial-gradient(circle,rgba(99,144,255,0.08) 0%,transparent 70%);}
.orb2{width:350px;height:350px;bottom:-60px;left:-60px;background:radial-gradient(circle,rgba(129,140,248,0.07) 0%,transparent 70%);}

.auth-card{width:100%;max-width:440px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:40px;position:relative;z-index:1;animation:fadeUp 0.5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

.auth-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px;}
.auth-logo-icon{width:44px;height:44px;border-radius:12px;overflow:hidden;box-shadow:0 0 20px var(--blue-glow);}
.auth-logo-icon img{width:100%;height:100%;object-fit:cover;}
.auth-logo-text{font-size:20px;font-weight:800;}
.auth-logo-text span{color:var(--blue);}

.auth-title{font-size:26px;font-weight:800;text-align:center;margin-bottom:6px;}
.auth-sub{font-size:14px;color:var(--gray-lt);text-align:center;margin-bottom:32px;}

.form-group{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
.form-label{font-size:12px;font-weight:700;color:var(--gray-lt);text-transform:uppercase;letter-spacing:0.5px;}
.form-input{padding:12px 16px;border-radius:11px;background:var(--surface);border:1px solid var(--border);color:var(--white);font-family:'Outfit';font-size:14px;transition:all 0.2s;outline:none;width:100%;}
.form-input:focus{border-color:var(--border-h);box-shadow:0 0 0 3px rgba(99,144,255,0.07);}
.form-input::placeholder{color:var(--gray);}
.form-input.invalid{border-color:rgba(239,68,68,0.4);}

.input-wrap{position:relative;}
.input-wrap .form-input{padding-right:44px;}
.toggle-pw{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray);font-size:16px;padding:4px;line-height:1;}
.toggle-pw:hover{color:var(--blue);}

/* Password strength */
.pw-strength{margin-top:6px;display:flex;gap:4px;}
.pw-bar{flex:1;height:3px;border-radius:3px;background:var(--gray-dk);transition:background 0.3s;}
.pw-bar.weak{background:#ef4444;}
.pw-bar.medium{background:#f59e0b;}
.pw-bar.strong{background:#22c55e;}
.pw-label{font-size:11px;color:var(--gray);margin-top:3px;}

.auth-btn{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--accent));color:#fff;font-weight:700;font-size:15px;border:none;cursor:pointer;box-shadow:0 0 28px var(--blue-glow);transition:transform 0.2s,opacity 0.2s;font-family:'Outfit';margin-top:4px;}
.auth-btn:hover{transform:translateY(-1px);}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.auth-divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--gray);font-size:13px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}

.auth-link-btn{width:100%;padding:13px;border-radius:12px;background:rgba(255,255,255,0.03);color:var(--white);font-weight:600;font-size:14px;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;font-family:'Outfit';text-align:center;text-decoration:none;display:block;}
.auth-link-btn:hover{border-color:var(--border-h);}

.auth-footer{text-align:center;margin-top:24px;font-size:13px;color:var(--gray);}
.auth-footer a{color:var(--blue);text-decoration:none;font-weight:600;}
.auth-footer a:hover{text-decoration:underline;}

.alert{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:16px;display:none;}
.alert.show{display:block;}
.alert.error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#ef4444;}
.alert.success{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);color:#22c55e;}

.terms-note{font-size:11px;color:var(--gray);text-align:center;margin-top:14px;line-height:1.5;}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:500px){body,*,a,button{cursor:auto!important;}#cursor-dot,#cursor-ring{display:none!important;}.auth-card{padding:28px 20px;}}
</style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-ring">
  <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
    <circle cx="22" cy="22" r="18" stroke="#6390ff" stroke-width="1" opacity="0.6"/>
    <line x1="22" y1="0" x2="22" y2="8" stroke="#6390ff" stroke-width="1" opacity="0.4"/>
    <line x1="22" y1="36" x2="22" y2="44" stroke="#6390ff" stroke-width="1" opacity="0.4"/>
    <line x1="36" y1="22" x2="44" y2="22" stroke="#6390ff" stroke-width="1" opacity="0.4"/>
  </svg>
</div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon"><img src="logo.png" alt="EU"></div>
    <div class="auth-logo-text">Exotic <span>Utilities</span></div>
  </div>

  <div class="auth-title">Create account</div>
  <div class="auth-sub">Join Exotic Utilities to track your bot orders</div>

  <div class="alert" id="alert"></div>

  <div class="form-group">
    <label class="form-label">Email Address</label>
    <input class="form-input" id="email" type="email" placeholder="you@example.com" autocomplete="email">
  </div>

  <div class="form-group">
    <label class="form-label">Discord Username</label>
    <input class="form-input" id="discord" type="text" placeholder="e.g. yourname" autocomplete="off">
  </div>

  <div class="form-group">
    <label class="form-label">Password</label>
    <div class="input-wrap">
      <input class="form-input" id="password" type="password" placeholder="Minimum 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
      <button class="toggle-pw" onclick="togglePw('password',this)" type="button">👁</button>
    </div>
    <div class="pw-strength">
      <div class="pw-bar" id="bar1"></div>
      <div class="pw-bar" id="bar2"></div>
      <div class="pw-bar" id="bar3"></div>
      <div class="pw-bar" id="bar4"></div>
    </div>
    <div class="pw-label" id="pw-label">Enter a password</div>
  </div>

  <div class="form-group">
    <label class="form-label">Confirm Password</label>
    <div class="input-wrap">
      <input class="form-input" id="confirm" type="password" placeholder="Repeat your password" autocomplete="new-password">
      <button class="toggle-pw" onclick="togglePw('confirm',this)" type="button">👁</button>
    </div>
  </div>

  <button class="auth-btn" id="signup-btn" onclick="handleSignup()">Create Account</button>

  <div class="terms-note">By creating an account you agree to our terms. One account per email address — duplicates are blocked.</div>

  <div class="auth-divider">already have an account?</div>

  <a href="login.html" class="auth-link-btn">Sign In</a>

  <div class="auth-footer">
    <a href="index.html">← Back to Home</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ══════════════════════════════════════════
//  IMPORTANT: Replace these with your Supabase project values
//  from: https://supabase.com/dashboard/project/_/settings/api
// ══════════════════════════════════════════
const SUPABASE_URL  = "https://ietezconrmnmkrgxlyauk.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlldGV6Y25ybW5ta3JneGx5YXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDQ1NjksImV4cCI6MjA4ODY4MDU2OX0.4enYveAnns7gyZqZAFjQB9FJFfhvLEtmQLPJvP2hwiM";

// Discord webhook for logging new signups
const WEBHOOK_URL = "https://discord.com/api/webhooks/1480715326663426058/Q8eWvzJpra9Fg4UBjC1QmC3xTIo9skm-ySQkO8wNrvctV8A_9xbL8GVRBZQ_sc7pjbNA";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href="dashboard.html";
});

function showAlert(msg,type="error"){
  const el=document.getElementById("alert");
  el.textContent=msg;el.className="alert show "+type;
}
function togglePw(id,btn){
  const inp=document.getElementById(id);
  inp.type=inp.type==="password"?"text":"password";
  btn.textContent=inp.type==="password"?"👁":"🙈";
}

function checkStrength(pw){
  let score=0;
  if(pw.length>=8) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  const bars=["bar1","bar2","bar3","bar4"];
  const labels=["","Weak","Fair","Good","Strong"];
  const classes=["","weak","medium","medium","strong"];
  bars.forEach((id,i)=>{
    const el=document.getElementById(id);
    el.className="pw-bar"+(i<score?" "+classes[score]:"");
  });
  document.getElementById("pw-label").textContent=pw.length?labels[score]:"Enter a password";
}

async function handleSignup(){
  const email=document.getElementById("email").value.trim();
  const discord=document.getElementById("discord").value.trim();
  const password=document.getElementById("password").value;
  const confirm=document.getElementById("confirm").value;
  const btn=document.getElementById("signup-btn");

  if(!email||!discord||!password||!confirm){showAlert("Please fill in all fields.");return;}
  if(password.length<8){showAlert("Password must be at least 8 characters.");return;}
  if(password!==confirm){showAlert("Passwords don't match.");return;}

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Creating account...';

  const {data,error}=await sb.auth.signUp({
    email,
    password,
    options:{
      data:{ discord_username: discord }
    }
  });

  if(error){
    showAlert(error.message);
    btn.disabled=false;btn.textContent="Create Account";
    return;
  }

  // Log new signup to Discord webhook
  try{
    await fetch(WEBHOOK_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        username:"Exotic Utilities",
        embeds:[{
          title:"New Account Created",
          color:0x6390ff,
          fields:[
            {name:"📧 Email",value:email,inline:true},
            {name:"💬 Discord",value:discord,inline:true},
          ],
          footer:{text:"Exotic Utilities Auth System"},
          timestamp:new Date().toISOString()
        }]
      })
    });
  }catch(e){console.warn("Webhook log failed:",e);}

  showAlert("Account created! Check your email to verify, then sign in.","success");
  setTimeout(()=>window.location.href="login.html",3000);
}

document.addEventListener("keydown",e=>{if(e.key==="Enter")handleSignup();});

(function(){
  const dot=document.getElementById("cursor-dot"),ring=document.getElementById("cursor-ring");
  let mx=-100,my=-100,dx=-100,dy=-100,rx=-100,ry=-100,hov=false;
  document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;});
  document.addEventListener("mouseover",e=>{if(e.target.closest("a,button,input"))hov=true;});
  document.addEventListener("mouseout",e=>{if(e.target.closest("a,button,input"))hov=false;});
  function tick(){
    dx+=(mx-dx)*0.45;dy+=(my-dy)*0.45;rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;
    dot.style.transform=`translate(${dx-5}px,${dy-5}px)`;
    const s=hov?1.8:1;ring.style.transform=`translate(${rx-22}px,${ry-22}px) scale(${s})`;
    ring.style.opacity=hov?"0.7":"0.4";requestAnimationFrame(tick);
  }tick();
})();
</script>
</body>
</html>
